    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }

    body {
      font-family: 'Acros', sans-serif;
      cursor: none;
      background: #c8c3bc;
    }

    #cursor {
      width: 10px; height: 10px;
      background: #8B3A2A;
      border-radius: 50%;
      position: fixed; top: 0; left: 0;
      pointer-events: none; z-index: 9999;
      transform: translate(-50%,-50%);
      mix-blend-mode: multiply;
      transition: width .18s, height .18s;
    }
    #cursor.h { width: 28px; height: 28px; }

    /*
      The design frame is 1440×960.
      We place everything in a 1440×960 container and scale it to fit
      the viewport, preserving aspect ratio.
    */
    #stage {
      position: fixed;
      top: 0; left: 0;
      width: 1440px;
      height: 960px;
      transform-origin: top left;
    }

    /* Background photo */
    #bg {

<script>
  // Scale the 1440×960 stage to fit the viewport
  function resize() {
    const scaleX = window.innerWidth  / 1440;
    const scaleY = window.innerHeight / 960;
    const scale  = Math.min(scaleX, scaleY);
    const stage  = document.getElementById('stage');
    stage.style.transform = `scale(${scale})`;
    // Center if letterboxed
    stage.style.left = ((window.innerWidth  - 1440 * scale) / 2) + 'px';
    stage.style.top  = ((window.innerHeight - 960  * scale) / 2) + 'px';
  }
  resize();
  window.addEventListener('resize', resize);

  // Cursor
  const cur = document.getElementById('cursor');
  let mx=0,my=0,cx=0,cy=0;
  document.addEventListener('mousemove', e=>{ mx=e.clientX; my=e.clientY; });
  document.querySelectorAll('a').forEach(el=>{
    el.addEventListener('mouseenter',()=>cur.classList.add('h'));
    el.addEventListener('mouseleave',()=>cur.classList.remove('h'));
  });
  (function loop(){
    cx+=(mx-cx)*.15; cy+=(my-cy)*.15;
    cur.style.left=cx+'px'; cur.style.top=cy+'px';
    requestAnimationFrame(loop);
  })();
</script>
