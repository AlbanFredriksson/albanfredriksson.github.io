    /* ═══════════════════════════════════════
       SPLASH SCREEN
    ═══════════════════════════════════════ */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: #f5ede8;
      display: flex;
      align-items: center;
      justify-content: center;
      /* fades out after 3s */
      animation: splashOut 0.8s ease 3s forwards;
    }

    /* Wrapper rotates, image just fades in — no transform conflict */
    #splash-icon-wrap {
      width: clamp(80px, 13vw, 187px);
      height: clamp(80px, 13vw, 187px);
      animation: splashSpin 8s linear infinite;
    }

    #splash-icon {
      width: 100%;
      height: 100%;
      display: block;
      animation: splashIconIn 0.9s ease 0.2s both;
    }

    @keyframes splashSpin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    @keyframes splashIconIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes splashOut {
      0%   { opacity: 1; transform: scale(1); pointer-events: all; }
      100% { opacity: 0; transform: scale(1.04); pointer-events: none; }
    }

    /* Once splash finishes, remove it from flow */
    #splash.hidden {
      display: none;
    }

    /* ═══════════════════════════════════════
       HERO — hidden until splash is done
    ═══════════════════════════════════════ */
    #hero {
      position: relative;
      width: 100%;
      height: 100vh;
      min-height: 600px;
      background: #f5ede8;
      overflow: hidden;
      opacity: 0;
      animation: heroIn 0.9s ease 3.2s forwards;
    }

    @keyframes heroIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* Torn paper bottom */
    #hero-torn {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: clamp(40px, 7.14vh, 69px);
      z-index: 2;
      pointer-events: none;
    }
    #hero-torn svg {
      width: 100%; height: 100%;
      display: block;
    }

    /* ═══════════════════════════════════════
       NAV
    ═══════════════════════════════════════ */
    nav {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 10;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: clamp(32px, 8.47vw, 122px);
      padding: clamp(20px, 3.33vh, 32px) 0;
    }

    .nav-item {
      display: flex; align-items: center;
      gap: clamp(6px, 0.9vw, 13px);
      text-decoration: none;
      color: #343434;
    }

    .nav-icon {
      width: clamp(12px, 1.32vw, 19px);
      height: clamp(12px, 1.32vw, 19px);
      flex-shrink: 0;
    }

    .nav-label {
      font-family: 'Poppins', sans-serif;
      font-size: clamp(12px, 1.39vw, 20px);
      font-weight: 400;
      color: #343434;
      white-space: nowrap;
      letter-spacing: 0.01em;
    }

    /* ═══════════════════════════════════════
       PHOTO
    ═══════════════════════════════════════ */
    #photo-wrap {
      position: absolute;
      right: clamp(20px, 9.58vw, 228px);
      top: clamp(60px, 16.56vh, 159px);
      width: clamp(200px, 28.125vw, 405px);
      height: clamp(300px, 63.44vh, 609px);
      border-radius: 9999px;
      overflow: hidden;
      z-index: 5;
    }

    #photo-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    /* ═══════════════════════════════════════
       TEXT BLOCK
    ═══════════════════════════════════════ */
    #text-block {
      position: absolute;
      left: clamp(24px, 11.81vw, 170px);
      top: clamp(160px, 31.98vh, 307px);
      width: clamp(280px, 50.28vw, 724px);
      z-index: 6;
    }

    #tagline {
      display: flex;
      align-items: center;
      gap: clamp(6px, 0.9vw, 13px);
      margin-bottom: clamp(12px, 2.08vh, 20px);
    }

    .tagline-word {
      font-family: 'Poppins', sans-serif;
      font-size: clamp(16px, 2.22vw, 32px);
      font-weight: 400;
      color: #343434;
      letter-spacing: 0.02em;
    }

    #spin-icon {
      width: clamp(14px, 1.74vw, 25px);
      height: clamp(14px, 1.74vw, 25px);
      flex-shrink: 0;
      animation: splashSpin 8s linear infinite;
    }

    #headline {
      font-family: 'Acros', sans-serif;
      font-size: clamp(28px, 4.44vw, 64px);
      font-weight: 400;
      color: #343434;
      text-transform: uppercase;
      line-height: 1.2054;
      letter-spacing: -0.01em;
    }

    /* Mobile */
    @media (max-width: 600px) {
      nav { gap: 16px; flex-wrap: wrap; padding: 16px; }
      .nav-label { font-size: 11px; }
    }
  </style>
</head>
